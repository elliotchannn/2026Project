name: Update weather

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Update Futian weather cache
        run: node scripts/update_weather.mjs
      - name: Commit weather cache
        run: |
          if git diff --quiet weather-cache.json; then
            echo "Weather cache unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weather-cache.json
          git commit -m "Update weather cache"
          git push
